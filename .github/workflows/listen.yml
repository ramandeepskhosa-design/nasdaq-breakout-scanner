name: Telegram On-Demand Trigger

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes, all day
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  listen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Check Telegram and scan if requested
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_listener.py

      - name: Commit updated offset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add offset.txt
          git diff --staged --quiet || git commit -m "Update Telegram offset [skip ci]"
          git push
