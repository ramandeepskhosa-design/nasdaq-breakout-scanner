name: NASDAQ Breakout Scan

on:
  schedule:
    # GitHub's own scheduler can lag by 1+ hour on low-traffic repos, so we
    # fire 5 close-together attempts around 7:00 PM IST. A dedupe guard
    # (last_nasdaq_scan.txt) ensures only the FIRST one that actually runs
    # each day sends a message — the rest are silent no-ops.
    - cron: "30 13 * * 1-5"   # 7:00 PM IST
    - cron: "38 13 * * 1-5"   # 7:08 PM IST
    - cron: "46 13 * * 1-5"   # 7:16 PM IST
    - cron: "54 13 * * 1-5"   # 7:24 PM IST
    - cron: "02 14 * * 1-5"   # 7:32 PM IST
  workflow_dispatch: {}   # lets you trigger it manually from the GitHub app/website anytime, always runs

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install yfinance pandas lxml

      - name: Check dedupe guard (skip if already sent today)
        id: guard
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          LAST=$(cat last_nasdaq_scan.txt 2>/dev/null || echo "")
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          elif [ "$TODAY" = "$LAST" ]; then
            echo "Already sent today ($LAST) — skipping duplicate scheduled run."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run breakout scan
        if: steps.guard.outputs.should_run == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python breakout_scan.py

      - name: Update dedupe guard
        if: steps.guard.outputs.should_run == 'true' && github.event_name == 'schedule'
        run: |
          date -u +%Y-%m-%d > last_nasdaq_scan.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add last_nasdaq_scan.txt
          git commit -m "Update NASDAQ scan dedupe guard [skip ci]" || true
          git push || true
